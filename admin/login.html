<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | WolfHustler Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="admin.css">
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <h1>WOLFHUSTLER</h1>
    <p class="sub">Admin panel</p>
    <div class="error-text" id="error"></div>
    <form id="login-form">
      <label for="username">Username</label>
      <input type="text" id="username" required autocomplete="username">
      <label for="password">Password</label>
      <input type="password" id="password" required autocomplete="current-password">
      <button type="submit" class="btn btn-primary" style="width:100%">SIGN IN</button>
    </form>
  </div>
</div>
<script>
document.getElementById("login-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;
  const errorEl = document.getElementById("error");
  errorEl.textContent = "";
  try {
    const res = await fetch("/api/admin/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password }),
    });
    const data = await res.json();
    if (!res.ok) {
      errorEl.textContent = data.error || "Login failed";
      return;
    }
    window.location.href = "/admin/dashboard.html";
  } catch (err) {
    errorEl.textContent = "Could not reach the server.";
  }
});
</script>
</body>
</html>
